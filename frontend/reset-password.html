<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passwort zurücksetzen - FightLog</title>
    <link rel="stylesheet" href="./styles/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="./src/services/notify.service.js"></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2>Passwort zurücksetzen</h2>
            <form id="resetForm">
                <div class="form-group">
                    <label>Neues Passwort</label>
                    <input type="password" id="newPassword" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Passwort bestätigen</label>
                    <input type="password" id="confirmPassword" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-key"></i> Passwort zurücksetzen
                </button>
            </form>
            <p style="margin-top: 1rem; text-align: center;">
                <a href="simple.html">Zurück zum Login</a>
            </p>
        </div>
    </div>
    
    <script type="module">
        import { apiService } from './src/services/api.service.js';
        
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        if (!token) {
            window.notify.alert('Ungültiger Reset-Link. Bitte fordern Sie einen neuen Link an.');
            setTimeout(() => window.location.href = 'simple.html', 2000);
        }
        
        // Passwort-Mindestlänge vom Backend laden
        let passwordMinLength = 8; // Fallback-Wert
        try {
            const result = await apiService.getPasswordMinLength();
            if (result && result.success && result.password_min_length) {
                passwordMinLength = parseInt(result.password_min_length) || 8;
            }
        } catch (error) {
            console.warn('Could not load password min length, using default:', error);
        }
        
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (newPassword !== confirmPassword) {
                await window.notify.alert('Die Passwörter stimmen nicht überein');
                return;
            }
            
            if (newPassword.length < passwordMinLength) {
                await window.notify.alert(`Passwort muss mindestens ${passwordMinLength} Zeichen lang sein`);
                return;
            }
            
            try {
                const result = await apiService.resetPassword(token, newPassword);
                if (result.success) {
                    await window.notify.alert('Passwort erfolgreich zurückgesetzt! Sie können sich jetzt anmelden.');
                    setTimeout(() => window.location.href = 'simple.html', 2000);
                } else {
                    await window.notify.alert(result.error || 'Fehler beim Zurücksetzen des Passworts');
                }
            } catch (error) {
                console.error('Reset password error:', error);
                await window.notify.alert('Fehler beim Zurücksetzen des Passworts');
            }
        });
    </script>
</body>
</html>
